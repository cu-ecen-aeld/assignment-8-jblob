name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  full-test:
    container: cuaesd/aesd-autotest:24-assignment7-buildroot
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v2

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Run full test
        run: |
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8
          ./full-test.sh
