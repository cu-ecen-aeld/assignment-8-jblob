name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  full-test:
    runs-on: self-hosted
    container: cuaesd/aesd-autotest:24-assignment7-buildroot

    steps:
      - uses: actions/checkout@v2

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          apt-get update || true
          apt-get install -y \
            gawk \
            chrpath \
            diffstat \
            lz4 \
            zstd \
            unzip \
            python3 \
            build-essential \
            locales || true

      - name: Generate locale correctly
        run: |
          echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
          apt-get install -y locales || true
          dpkg-reconfigure --frontend=noninteractive locales || true

          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8

          locale

      - name: Create non-root user
        run: |
          useradd -m builder
          chown -R builder:builder .

      - name: Run full test
        run: |
          su builder -c "
            export LANG=en_US.UTF-8
            export LC_ALL=en_US.UTF-8
            export LANGUAGE=en_US.UTF-8
            locale
            ./full-test.sh
          "
