name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  full-test:
    runs-on: self-hosted

    container:
      image: cuaesd/aesd-autotest:24-assignment7-buildroot
      options: -v /home/jblob/yocto-cache:/yocto-cache -v /home/jblob/yocto-build:/build

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Install dependencies + locale
        run: |
          apt-get update
          apt-get install -y locales python3-distutils gawk chrpath diffstat lz4 zstd unzip build-essential
          echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
          locale-gen

      - name: Setup builder user and workspace
        run: |
          useradd -m builder || true
          # Link zum permanenten Build-Ordner auf dem Laptop
          rm -rf build
          ln -s /build build
          mkdir -p build/conf
          chown -R builder:builder .
          chown -R builder:builder /build
          chown -R builder:builder /yocto-cache || true

      - name: Configure Yocto (local.conf & bblayers)
        run: |
          su builder -c "
            # 1. local.conf bereinigen und fixieren
            [ -f build/conf/local.conf ] || echo 'CONF_VERSION = \"2\"' > build/conf/local.conf
            sed -i '/DL_DIR/d' build/conf/local.conf
            sed -i '/SSTATE_DIR/d' build/conf/local.conf
            sed -i '/TMPDIR/d' build/conf/local.conf
            sed -i '/MACHINE/d' build/conf/local.conf
            sed -i '/QB_SLIRP_OPT/d' build/conf/local.conf
            
            echo 'DL_DIR = \"/yocto-cache/downloads\"' >> build/conf/local.conf
            echo 'SSTATE_DIR = \"/yocto-cache/sstate-cache\"' >> build/conf/local.conf
            echo 'TMPDIR = \"/build/tmp\"' >> build/conf/local.conf
            echo 'MACHINE = \"qemuarm64\"' >> build/conf/local.conf
            
            # DER ENTSCHEIDENDE FIX: Port 10022 direkt in die Build-Konfiguration
            echo 'QB_SLIRP_OPT = \"hostfwd=tcp::10022-:22\"' >> build/conf/local.conf

            # 2. bblayers.conf Pfade zurücksetzen
            # Wir löschen die alten Pfade, damit das build.sh Skript sie neu (korrekt) setzt
            if [ -f build/conf/bblayers.conf ]; then
              sed -i '/meta-aesd/d' build/conf/bblayers.conf
              sed -i '/poky\/meta/d' build/conf/bblayers.conf
            fi
          "

      - name: Patch runqemu script
        run: |
          # Wir entfernen die hartcodierten QEMU_EXTRA_ARGS aus deinem Skript,
          # da diese jetzt sauber über die local.conf (QB_SLIRP_OPT) kommen.
          find . -name "runqemu.sh" -exec sed -i 's/export QEMU_EXTRA_ARGS=.*//g' {} +

      - name: Run full test
        run: |
          su builder -c "
            export LANG=en_US.UTF-8
            export LC_ALL=en_US.UTF-8
            export HOME=/home/builder
            export MACHINE=qemuarm64
            ./full-test.sh
          "
