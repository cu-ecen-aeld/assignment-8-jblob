- name: Repair and Configure Yocto
        shell: bash
        run: |
          su builder -s /bin/bash -c "
            # 1. local.conf konfigurieren
            mkdir -p build/conf
            [ -f build/conf/local.conf ] || echo 'CONF_VERSION = \"2\"' > build/conf/local.conf
            
            # Alte Einträge entfernen um Duplikate zu vermeiden
            sed -i '/DL_DIR/d; /SSTATE_DIR/d; /TMPDIR/d; /MACHINE/d; /QB_SLIRP_OPT/d' build/conf/local.conf
            
            echo 'DL_DIR = \"/yocto-cache/downloads\"' >> build/conf/local.conf
            echo 'SSTATE_DIR = \"/yocto-cache/sstate-cache\"' >> build/conf/local.conf
            echo 'TMPDIR = \"/build/tmp\"' >> build/conf/local.conf
            echo 'MACHINE = \"qemuarm64\"' >> build/conf/local.conf
            echo 'QB_SLIRP_OPT = \"hostfwd=tcp::10022-:22\"' >> build/conf/local.conf

            # 2. bblayers.conf RADIKAL FIX
            # Wir löschen die Datei, damit sie im nächsten Schritt sauber neu erstellt wird.
            # Dies behebt den 'BBLAYERS definition missing' Fehler.
            rm -f build/conf/bblayers.conf
          "

      - name: Run full test
        shell: bash
        run: |
          su builder -s /bin/bash -c "
            export LANG=en_US.UTF-8
            export LC_ALL=en_US.UTF-8
            export HOME=/home/builder
            
            # Initialisiert die Umgebung und erstellt eine frische bblayers.conf
            source poky/oe-init-build-env build
            
            # Fügt den Layer mit relativem Pfad hinzu (funktioniert im Container & Host)
            bitbake-layers add-layer ../meta-aesd
            
            cd /__w/assignments-3-and-later-jblob/assignments-3-and-later-jblob
            ./full-test.sh
          "
